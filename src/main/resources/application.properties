# ==========================================
# SERVER
# ==========================================
server.port=8080
spring.application.name=evacuation-system

# ==========================================
# MYSQL DATABASE
# ==========================================
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# JPA / HIBERNATE
# ==========================================
# update = auto creates/updates tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET}
# 24 hours in milliseconds
jwt.expiration=86400000

# Admin registration secret
admin.code=${ADMIN_CODE:}

# ==========================================
# EMAIL (Brevo SMTP)
# ==========================================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USER:}
spring.mail.password=${BREVO_SMTP_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false
app.mail.from=${MAIL_FROM:noreply@example.com}

# ==========================================
# JACKSON
# ==========================================
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ==========================================
# MULTIPART (for blueprint file uploads)
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# ANTHROPIC CLAUDE VISION
# ==========================================
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-6

# ==========================================
# HMAC SECRET (QR code signing)
# ==========================================
app.hmac.secret=${HMAC_SECRET:default-hmac-secret-change-in-prod}

# ==========================================
# FILE UPLOAD STORAGE
# ==========================================
app.upload.dir=${UPLOAD_DIR:uploads}

# ==========================================
# FRONTEND URL (for password reset links)
# ==========================================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ==========================================
# LOGGING
# ==========================================
logging.level.com.evacuation=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
